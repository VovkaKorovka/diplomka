<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music Admin Panel</title>

<link rel="stylesheet" href="css/style.css">

<style>

/* =========================
   GLOBAL
========================= */

body {
  font-family: Arial, sans-serif;
  background: #0f0f14;
  color: #fff;
  margin: 0;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #1a1a22;
}

/* NAV */
nav a {
  margin: 0 10px;
  color: white;
  text-decoration: none;
}

/* TABS */
.admin-tabs {
  display: flex;
  gap: 10px;
  padding: 10px;
  flex-wrap: wrap;
}

.admin-tabs button {
  padding: 10px 12px;
  border: none;
  cursor: pointer;
  background: #2a2a35;
  color: white;
  border-radius: 8px;
  transition: 0.2s;
}

.admin-tabs button:hover {
  background: #444;
}

/* GRID */
#adminGrid {
  width: 100%;
  display: block;
  padding: 10px;
}

/* CARD */
.card {
  background: #1b1b24;
  padding: 15px;
  border-radius: 12px;
  width: 100%;
  box-sizing: border-box;
  margin-bottom: 10px;
}

/* =========================
   INPUTS (FIX)
========================= */

input,
textarea,
select {
  width: 100%;
  padding: 10px 12px;
  margin-top: 6px;
  margin-bottom: 12px;

  background: #12121a;
  border: 1px solid #2a2a35;
  border-radius: 8px;

  color: #fff;
  font-size: 14px;

  outline: none;
  transition: 0.2s ease;
  box-sizing: border-box;
}

input:focus,
textarea:focus,
select:focus {
  border-color: #6c5ce7;
  box-shadow: 0 0 0 2px rgba(108, 92, 231, 0.25);
}

textarea {
  min-height: 120px;
  resize: vertical;
}

/* LABEL */
label {
  display: block;
  margin: 6px 0;
  font-size: 13px;
  color: #b8b8c7;
}

/* =========================
   BUTTONS (FIX)
========================= */

button {
  padding: 10px 12px;
  border: none;
  border-radius: 8px;

  background: #2a2a35;
  color: white;

  cursor: pointer;
  transition: 0.2s;
  font-size: 14px;
}

button:hover {
  background: #3a3a4a;
}

button:active {
  transform: scale(0.97);
}

/* PRIMARY */
button.primary,
button.create {
  background: #6c5ce7;
}

button.primary:hover,
button.create:hover {
  background: #7d6cf0;
}

/* DANGER */
button.danger {
  background: #e74c3c;
}

button.danger:hover {
  background: #ff5c4a;
}

/* =========================
   MUSIC PANEL
========================= */

.music-wrapper {
  display: flex;
  gap: 20px;
  width: 100%;
  align-items: flex-start;
}

.music-albums {
  flex: 0 0 320px;
  background: #15151d;
  padding: 15px;
  border-radius: 12px;
  height: calc(100vh - 200px);
  overflow-y: auto;
}

.music-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 15px;
  min-width: 0;
}

.music-content .card {
  width: 100%;
}

/* SCROLL */
.music-albums::-webkit-scrollbar {
  width: 6px;
}

.music-albums::-webkit-scrollbar-thumb {
  background: #444;
  border-radius: 10px;
}

</style>

</head>

<body>

<header class="header">
  <div>🎧 Music Admin</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="albums.html">Albums</a>
  </nav>

  <button onclick="logout()">Logout</button>
</header>

<div class="admin-tabs">
  <button onclick="switchTab('dashboard')">Dashboard</button>
  <button onclick="switchTab('articles')">Articles</button>
  <button onclick="switchTab('music')">Music</button>
  <button onclick="switchTab('users')">Users</button>
  <button onclick="switchTab('comments')">Comments</button>
  <button onclick="switchTab('contact')">Messages</button>
  <button onclick="switchTab('countries')">Countries</button>
  <button onclick="switchTab('cultures')">Cultures</button>
</div>

<section id="adminGrid"></section>

<script src="js/admin.js"></script>

</body>
</html>
