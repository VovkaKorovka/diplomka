<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Music of the World</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">
</head>

<body>

<header class="header">

  <div class="logo">🎵 Music World</div>

  <nav>
    <a href="index.html">Home</a>
    <a href="albums.html">Albums</a>
  </nav>

  <div class="auth-buttons" id="authButtons">
    <button onclick="location.href='profile.html'">My Profile</button>
  </div>

</header>

<section class="hero">
  <h1>Music of the World</h1>
  <p>Explore cultures, instruments and traditions</p>

  <button onclick="goExplore()" class="main-btn">
    Start Exploring
  </button>
</section>

<!-- ================= FOOTER ================= -->
<footer class="footer">

  <div class="footer-content">

    <div class="footer-section">
      <h3>Music World</h3>
      <p>Explore cultures, instruments and traditions from around the world.</p>
    </div>

    <div class="footer-section">
      <h4>Links</h4>
      <a href="index.html">Home</a>
      <a href="albums.html">Albums</a>
      <a href="profile.html">Profile</a>
    </div>

    <div class="footer-section">
      <h4>Contact</h4>

      <form id="contactForm">
        <input type="email" id="email" placeholder="Your email" required />
        <textarea id="message" placeholder="Your message" required></textarea>

        <button type="submit" id="contactBtn">Send</button>

        <p id="contactStatus"></p>
      </form>

    </div>

  </div>

  <div class="footer-bottom">
    © 2026 Music World. All rights reserved.
  </div>

</footer>

<script src="js/app.js"></script>
</body>
</html>
